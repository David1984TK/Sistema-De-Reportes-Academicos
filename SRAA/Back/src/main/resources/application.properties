spring.application.name=back
server.port=${PORT:8080}
server.servlet.context-path=/sraa-api

# Perfil activo: "local" por defecto, Railway setea SPRING_PROFILES_ACTIVE=prod
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# =============================================
# MySQL
# Railway inyecta MYSQLHOST, MYSQLPORT, etc. automaticamente.
# NO usar MYSQL_URL porque Railway lo da en formato mysql:// (no JDBC).
# En local, application-local.properties sobreescribe todo.
# =============================================
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:sgaa_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hikari
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# SQL init deshabilitado — Hibernate gestiona el schema, DataInitializer los datos seed
spring.sql.init.mode=never

# JWT
jwt.secret=${JWT_SECRET:sgaa-utez-secret-key-min-32-chars-cambiar-en-prod}
jwt.expiration=86400000